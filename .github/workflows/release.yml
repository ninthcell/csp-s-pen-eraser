name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Build hook DLL
        run: cl /O2 /W4 /LD pen_eraser_hook.c user32.lib /Fe:pen_eraser_hook.dll

      - name: Compile resource
        run: rc pen_right_click.rc

      - name: Build exe
        run: cl /O2 /W4 pen_right_click.c pen_right_click.res user32.lib shell32.lib advapi32.lib

      - name: Package zip
        run: Compress-Archive -Path pen_right_click.exe, pen_eraser_hook.dll -DestinationPath csp-s-pen-eraser.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: csp-s-pen-eraser.zip
